<!-- wf-modal.html - Modal Dialog Component -->
<!--
  Usage: Copy this template for modals/dialogs
  - Replace title and content
  - Customize footer actions (confirm, cancel, delete, etc.)
  - Add form fields or content as needed
  - Adjust modal size with CSS classes (modal-sm, modal-md, modal-lg)
-->

<!-- Modal Overlay and Container -->
<div class="modal-overlay">
  <div class="modal">
    <!-- Modal Header -->
    <div class="modal-header">
      <h3 class="modal-title">Modal Title</h3>
      <button class="modal-close" aria-label="Close">×</button>
    </div>

    <!-- Modal Body -->
    <div class="modal-body">
      <p>Modal content goes here. This can include text, forms, tables, or any other content.</p>
    </div>

    <!-- Modal Footer -->
    <div class="modal-footer">
      <button class="btn btn-secondary">Cancel</button>
      <button class="btn btn-primary">Confirm</button>
    </div>
  </div>
</div>

<!-- Modal with Form Example -->
<div class="modal-overlay">
  <div class="modal modal-md">
    <div class="modal-header">
      <h3 class="modal-title">Create New Item</h3>
      <button class="modal-close">×</button>
    </div>

    <div class="modal-body">
      <form class="wf-form">
        <div class="form-group">
          <label class="form-label required">Name</label>
          <input type="text" class="form-input" placeholder="Enter name">
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea class="form-textarea" rows="3" placeholder="Enter description"></textarea>
        </div>
      </form>
    </div>

    <div class="modal-footer">
      <button class="btn btn-secondary">Cancel</button>
      <button class="btn btn-primary">Create</button>
    </div>
  </div>
</div>

<!-- Confirmation Modal Example -->
<div class="modal-overlay">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h3 class="modal-title">Confirm Action</h3>
      <button class="modal-close">×</button>
    </div>

    <div class="modal-body">
      <p>Are you sure you want to delete this item? This action cannot be undone.</p>
    </div>

    <div class="modal-footer">
      <button class="btn btn-secondary">Cancel</button>
      <button class="btn btn-danger">Delete</button>
    </div>
  </div>
</div>

<!-- Success Modal Example -->
<div class="modal-overlay">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h3 class="modal-title">Success!</h3>
      <button class="modal-close">×</button>
    </div>

    <div class="modal-body text-center">
      <div class="success-icon">✓</div>
      <h4>Operation Completed</h4>
      <p>Your changes have been saved successfully.</p>
    </div>

    <div class="modal-footer justify-center">
      <button class="btn btn-primary">OK</button>
    </div>
  </div>
</div>

<!-- Required CSS (included in common-styles.css) -->
<style>
  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;
  }

  .modal {
    background: white;
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    max-width: 600px;
    width: 100%;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    animation: modalFadeIn 0.2s ease-out;
  }

  @keyframes modalFadeIn {
    from {
      opacity: 0;
      transform: scale(0.95);
    }
    to {
      opacity: 1;
      transform: scale(1);
    }
  }

  /* Modal Sizes */
  .modal-sm {
    max-width: 400px;
  }

  .modal-md {
    max-width: 600px;
  }

  .modal-lg {
    max-width: 900px;
  }

  .modal-header {
    padding: 24px;
    border-bottom: 1px solid #e5e7eb;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .modal-title {
    font-size: 20px;
    font-weight: 600;
    color: #2563EB;
    margin: 0;
  }

  .modal-close {
    width: 32px;
    height: 32px;
    border: none;
    background: transparent;
    font-size: 32px;
    line-height: 1;
    color: #6b7280;
    cursor: pointer;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .modal-close:hover {
    background: #f3f4f6;
    color: #111827;
  }

  .modal-body {
    padding: 24px;
    flex: 1;
    overflow-y: auto;
    color: #374151;
    font-size: 15px;
    line-height: 1.6;
  }

  .modal-body.text-center {
    text-align: center;
  }

  .modal-footer {
    padding: 20px 24px;
    border-top: 1px solid #e5e7eb;
    display: flex;
    gap: 12px;
    justify-content: flex-end;
  }

  .modal-footer.justify-center {
    justify-content: center;
  }

  .success-icon {
    font-size: 64px;
    width: 100px;
    height: 100px;
    background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    color: #065f46;
  }

  .modal-body h4 {
    font-size: 20px;
    font-weight: 600;
    color: #2563EB;
    margin-bottom: 12px;
  }

  /* Danger button for delete confirmations */
  .btn-danger {
    background: #ef4444;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-danger:hover {
    background: #dc2626;
  }
</style>
