<!-- wf-topbar.html - Application Topbar Component (64px height) -->
<!--
  Usage: Copy this template and customize as needed
  - Update page title
  - Add/remove topbar actions
  - Customize notification badge
-->

<header class="topbar">
  <!-- Menu Toggle (mobile, optional) -->
  <button class="menu-toggle">☰</button>

  <!-- Page Title (shown in topbar) -->
  <div class="page-title">Page Title</div>

  <!-- Search Box (optional) -->
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" placeholder="Search...">
  </div>

  <!-- Topbar Actions -->
  <div class="topbar-actions">
    <!-- Notifications -->
    <button class="icon-btn">
      🔔
      <span class="badge">3</span>
    </button>

    <!-- User Menu -->
    <div class="user-menu">
      <div class="user-avatar">JD</div>
      <!-- Dropdown menu (add when needed) -->
    </div>
  </div>
</header>

<!-- Required CSS (included in common-styles.css) -->
<style>
  .topbar {
    height: 64px;
    background: white;
    border-bottom: 1px solid #e5e7eb;
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 20px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .menu-toggle {
    display: none; /* Show on mobile */
    width: 40px;
    height: 40px;
    border: none;
    background: transparent;
    font-size: 24px;
    color: #6b7280;
    cursor: pointer;
    border-radius: 8px;
  }

  .menu-toggle:hover {
    background: #f3f4f6;
  }

  .page-title {
    font-size: 20px;
    font-weight: 600;
    color: #2563EB;
  }

  .search-box {
    flex: 1;
    max-width: 400px;
    position: relative;
    display: flex;
    align-items: center;
  }

  .search-icon {
    position: absolute;
    left: 12px;
    font-size: 16px;
    color: #9ca3af;
  }

  .search-box input {
    width: 100%;
    height: 40px;
    padding: 0 12px 0 36px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: all 0.2s;
  }

  .search-box input:focus {
    border-color: #2563EB;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
  }

  .topbar-actions {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-left: auto;
  }

  .icon-btn {
    position: relative;
    width: 40px;
    height: 40px;
    border: none;
    background: transparent;
    font-size: 20px;
    cursor: pointer;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }

  .icon-btn:hover {
    background: #f3f4f6;
  }

  .badge {
    position: absolute;
    top: 6px;
    right: 6px;
    background: #ef4444;
    color: white;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 10px;
    min-width: 18px;
    text-align: center;
  }

  .user-menu {
    cursor: pointer;
  }

  .user-avatar {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 600;
    color: white;
  }
</style>
