<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Ascendent Wireframe</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #2563EB 0%, #3b82f6 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .back-link {
      position: fixed;
      top: 20px;
      left: 20px;
      color: white;
      text-decoration: none;
      padding: 8px 16px;
      background: rgba(255,255,255,0.2);
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.3s;
    }

    .back-link:hover {
      background: rgba(255,255,255,0.3);
    }

    .login-container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 48px;
      width: 100%;
      max-width: 420px;
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-box {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #2563EB 0%, #3b82f6 100%);
      border-radius: 16px;
      color: white;
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 16px;
    }

    .logo-text {
      font-size: 28px;
      font-weight: 700;
      color: #2563EB;
      letter-spacing: -0.5px;
    }

    .login-title {
      text-align: center;
      color: #6b7280;
      font-size: 16px;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 15px;
      transition: all 0.3s;
      font-family: inherit;
    }

    .form-input:focus {
      outline: none;
      border-color: #2563EB;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      margin-bottom: 24px;
    }

    .checkbox-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin-right: 8px;
      accent-color: #2563EB;
    }

    .checkbox-group label {
      font-size: 14px;
      color: #6b7280;
      cursor: pointer;
    }

    .submit-button {
      width: 100%;
      padding: 14px;
      background: #2563EB;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-family: inherit;
    }

    .submit-button:hover {
      background: #1D4ED8;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
    }

    .forgot-password {
      text-align: center;
      margin-top: 24px;
    }

    .forgot-password a {
      color: #2563EB;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
    }

    .forgot-password a:hover {
      text-decoration: underline;
    }

    .wireframe-note {
      text-align: center;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid #e5e7eb;
      color: #9ca3af;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <a href="index.html" class="back-link">← Back to Index</a>

  <div class="login-container">
    <div class="logo">
      <div class="logo-box">A</div>
      <div class="logo-text">ASCENDENT</div>
    </div>

    <div class="login-title">Sign in to continue</div>

    <form>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" placeholder="your.email@example.com">
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" placeholder="••••••••">
      </div>

      <div class="checkbox-group">
        <input type="checkbox" id="remember">
        <label for="remember">Remember me</label>
      </div>

      <button type="submit" class="submit-button">Sign In</button>

      <div class="forgot-password">
        <a href="#">Forgot password?</a>
      </div>
    </form>

    <div class="wireframe-note">
      This is a wireframe mockup
    </div>
  </div>
</body>
</html>
